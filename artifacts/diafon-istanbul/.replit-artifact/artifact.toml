kind = "web"
previewPath = "/"
title = "Diafon Istanbul"
version = "1.0.0"
id = "artifacts/diafon-istanbul"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20415

[services.development]
run = "pnpm --filter @workspace/diafon-istanbul run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/diafon-istanbul", "run", "build" ]
publicDir = "artifacts/diafon-istanbul/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20415"
BASE_PATH = "/"
